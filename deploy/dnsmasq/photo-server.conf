# photo-server LAN gateway (kgu.5). Installs to /etc/dnsmasq.d/.
#
# Architecture: the Dell is the WIRED gateway. The Ubiquiti UAP-AC-LR
# runs the wireless function itself, so we DO NOT use hostapd on the
# Dell (correction to the kgu.5 issue text; recorded in DEV_HANDOFF
# §9). The AP bridges wifi clients to L2; this dnsmasq gives them DHCP
# and DNS, and steers every DNS query back to us — offline-first (PRD
# N1) and a free captive-portal trigger (the OS sees "internet" but
# every host resolves to us, so the captive probe lands here and
# kgu.6's middleware pops the sign-in sheet).

# Bind only to eno1 so systemd-resolved on 127.0.0.53 is undisturbed.
interface=eno1
bind-interfaces
listen-address=192.168.50.1
except-interface=lo
except-interface=wlp6s0

# Offline: don't fall through to any upstream DNS or /etc/hosts.
no-resolv
no-hosts

# Wildcard DNS: every name resolves to the appliance.
address=/#/192.168.50.1
local-ttl=30

# Friendly hostname for the printed URL QR.
address=/photos.wedding/192.168.50.1

# DHCP for guests on the AP. Short lease so a one-day event doesn't
# hold IPs forever; large enough for ~150 guests x a couple of devices.
dhcp-range=192.168.50.10,192.168.50.200,12h
dhcp-option=option:router,192.168.50.1
dhcp-option=option:dns-server,192.168.50.1
dhcp-authoritative

# Quiet logs (the journal will get noisy with 150 guests).
quiet-dhcp
quiet-dhcp6
quiet-ra
