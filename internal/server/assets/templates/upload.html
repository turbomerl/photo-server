{{define "title"}}Drop · Wedding photos · M&I{{end}}
{{define "main"}}
<section class="upload-page">

  <div class="section-h">
    <span class="title">Add to the roll</span>
    <span class="sub">— from your phone</span>
  </div>

  <label class="bigbtn" id="up-pick">
    <input id="up-input" type="file" accept="image/*" multiple hidden>
    <span class="bigbtn-plus">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </span>
    <span class="bigbtn-text">
      <span class="bigbtn-label">Add photos</span>
      <span class="bigbtn-sub">multi-select OK · HEIC fine</span>
    </span>
    <span class="bigbtn-date">17·04·26</span>
  </label>

  <noscript>
    <form class="ns-form" action="/upload" method="post"
          enctype="multipart/form-data">
      <p>Without JavaScript you can still upload:</p>
      <input type="file" name="file" accept="image/*" multiple>
      <button type="submit">Upload</button>
    </form>
  </noscript>

  <div class="queue-head"><span class="label">Now uploading</span></div>
  <ul id="up-queue" class="queue" aria-live="polite"></ul>

  <div class="recent-head">
    <span class="title">Your contributions</span>
    <span class="note">(thank you!)</span>
  </div>
  <ul id="up-recent" class="grid">
    {{range .Recent}}
    <li class="cell"><a href="/p/{{.Hash}}"><img loading="lazy" src="/thumb/{{.Hash}}" alt=""></a></li>
    {{else}}
    <li class="empty" id="up-empty">Nothing yet — add your first photo.</li>
    {{end}}
  </ul>

</section>
{{end}}
{{define "scripts"}}<script src="/static/resize.js" defer></script>
<script src="/static/upload.js" defer></script>{{end}}
