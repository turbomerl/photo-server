{{define "title"}}Snap · Wedding photos · M&I{{end}}
{{define "main"}}
<section class="polaroid-page">

  <!-- Hero stack: three tilted polaroids of Mariam & Isambard -->
  <div class="hero-stack" aria-hidden="true">
    <div class="hero-poly hero-poly--1">
      <span class="tape"></span>
      <div class="frame"><img src="/static/img/couple-1.jpeg" alt=""></div>
      <div class="cap">
        <span class="caption">we did it</span>
        <span class="date">30·06·26</span>
      </div>
    </div>
    <div class="hero-poly hero-poly--2">
      <span class="tape"></span>
      <div class="frame"><img src="/static/img/couple-2.jpeg" alt=""></div>
      <div class="cap">
        <span class="caption">Mariam &amp; Isambard</span>
        <span class="date">30·06·26</span>
      </div>
    </div>
    <div class="hero-poly hero-poly--3">
      <span class="tape"></span>
      <div class="frame"><img src="/static/img/couple-3.jpeg" alt=""></div>
      <div class="cap">
        <span class="caption">the family</span>
        <span class="date">30·06·26</span>
      </div>
    </div>
  </div>

  <!-- Old-school camera body: tappable, opens the system camera -->
  <div class="camera-wrap">
    <label class="camera" id="ps-shutter" aria-label="Take photo">
      <input id="ps-shot" class="shutter-input" type="file"
             accept="image/*" capture="environment" hidden>
      <span class="brand-plate" aria-hidden="true">M&amp;I</span>
      <span class="auto" aria-hidden="true">auto · 35mm</span>
      <span class="counter" aria-hidden="true">07</span>
      <span class="led" aria-hidden="true"></span>
      <span class="led-label" aria-hidden="true">ready</span>
      <span class="lens" aria-hidden="true"></span>
      <span class="dome"><span class="dome-text">SNAP</span></span>
    </label>
  </div>

  <p class="shutter-hint">Tap the shutter — your photo lands in our album.</p>

  <noscript>
    <p class="noscript">Polaroid mode needs JavaScript. Use the
    <a href="/upload">Drop</a> tab to pick photos, or browse the
    <a href="/gallery">Roll</a>.</p>
  </noscript>

  <!-- Developing strip — JS appends .shot tiles here on capture -->
  <div class="strip-section">
    <div class="strip-head"><span>Just developed</span></div>
    <ul id="ps-strip" class="strip" aria-live="polite"></ul>
  </div>

</section>
{{end}}
{{define "scripts"}}<script src="/static/resize.js" defer></script>
<script src="/static/polaroid.js" defer></script>{{end}}
