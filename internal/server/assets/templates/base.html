{{define "base"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fdf3e2">
<title>{{block "title" .}}Wedding photos · M&I{{end}}</title>

<link rel="stylesheet" href="/static/app.css">
<script src="/static/session.js" defer></script>
</head>
<body>

<header class="appbar">
  <a class="brand" href="/" aria-label="Mariam and Isambard — home">
    <span class="m">M</span><span class="amp">&amp;</span><span class="i">I</span>
  </a>
</header>

<div class="name-tag-wrap">
  <label class="name-tag" for="ps-name">
    <span class="nt-body">
      <span class="nt-label">my name is</span>
      <input id="ps-name" type="text" inputmode="text" autocomplete="name"
             placeholder="tap to add yours" maxlength="40" value="{{.Name}}">
    </span>
  </label>
</div>

<main class="content">
{{block "main" .}}{{end}}
</main>

<nav class="tabbar" role="navigation" aria-label="Primary">
  <a class="tab{{if eq .Active "polaroid"}} is-active{{end}}" href="/"
     {{if eq .Active "polaroid"}}aria-current="page"{{end}}>
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9.5"/><circle cx="12" cy="12" r="4"/></svg>
    <span class="tab-label">Snap</span>
  </a>
  <a class="tab{{if eq .Active "upload"}} is-active{{end}}" href="/upload"
     {{if eq .Active "upload"}}aria-current="page"{{end}}>
    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="13" rx="1.5"/><rect x="6.5" y="3" width="3" height="3"/><line x1="6" y1="10" x2="6" y2="10.01"/><line x1="6" y1="15" x2="6" y2="15.01"/><line x1="18" y1="10" x2="18" y2="10.01"/><line x1="18" y1="15" x2="18" y2="15.01"/><line x1="10" y1="10" x2="14" y2="10"/><line x1="10" y1="15" x2="14" y2="15"/></svg>
    <span class="tab-label">Drop</span>
  </a>
  <a class="tab{{if eq .Active "gallery"}} is-active{{end}}" href="/gallery"
     {{if eq .Active "gallery"}}aria-current="page"{{end}}>
    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="3.5" width="7" height="7"/><rect x="13.5" y="3.5" width="7" height="7"/><rect x="3.5" y="13.5" width="7" height="7"/><rect x="13.5" y="13.5" width="7" height="7"/></svg>
    <span class="tab-label">Roll</span>
  </a>
</nav>

{{block "scripts" .}}{{end}}
</body>
</html>{{end}}
