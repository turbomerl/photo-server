{{define "title"}}Gallery · Wedding photos{{end}}
{{define "main"}}
<section class="gallery">
  <ul id="gal-grid" class="grid">
    {{range .Photos}}
    <li class="cell"><img loading="lazy" src="/thumb/{{.Hash}}" alt=""></li>
    {{else}}
    <li class="empty" id="gal-empty">No photos yet — be the first to
    share from <a href="/">Polaroid</a> or <a href="/upload">Upload</a>.</li>
    {{end}}
  </ul>
  <div id="gal-sentinel" class="sentinel" data-next-before="{{.NextBefore}}"></div>
</section>
{{end}}
{{define "scripts"}}<script src="/static/gallery.js" defer></script>{{end}}
